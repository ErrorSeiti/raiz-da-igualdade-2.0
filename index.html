<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raiz da Igualdade - Direitos Humanos</title>
    <meta name="description" content="Portal de informações sobre Direitos Humanos, liberdade, igualdade e justiça.">
    <meta name="keywords" content="direitos humanos, advocacia gratuita, justiça, igualdade, mapa jurídico">

    <!-- Bibliotecas Externas (CDNs) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide JS para renderização garantida de SVGs -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --azul-base-6: hsl(270, 60%, 95%);
            --azul-base-5: hsl(270, 60%, 85%);
            --azul-base-4: hsl(270, 50%, 75%);
            --azul-base-3: hsl(270, 50%, 65%);
            --azul-base-2: hsl(270, 60%, 55%);
            --azul-base-1: hsl(270, 60%, 40%);
            --azul-base: hsl(270, 50%, 25%);
            --azul-padrao1: hsl(270, 50%, 15%);
            --azul-padrao2: hsl(270, 60%, 8%);
        }
    }
    @layer base {
        body { @apply bg-[var(--azul-padrao1)] text-[var(--azul-base-6)] font-sans pb-0; }
        h1, h2, h3 { @apply text-[var(--azul-base-2)] font-bold; }
        h1 { @apply text-2xl md:text-3xl my-2; }
        h2 { @apply text-xl md:text-2xl mb-2; }
        p { @apply mb-4 leading-relaxed; }
    }
    @layer components {
        .btn-nav { @apply bg-transparent text-[var(--azul-base-6)] border-none px-4 py-2 m-1 rounded-lg cursor-pointer transition-colors hover:bg-[var(--azul-base-2)] hover:text-white font-medium; }
        .btn-nav.active { @apply bg-[var(--azul-base-2)] text-white; }
        .card-content { @apply bg-[var(--azul-base)] p-6 rounded-lg shadow-lg mb-6 text-left; }
        .fade-in { animation: fadeIn 0.5s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Hook para carregar ícones do Lucide
        function useLucide() {
            React.useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });
        }

        // --- COMPONENTES ---

        function Toast({ message, onClose }) {
            useLucide();
            React.useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, [onClose]);
            return (
                <div className="fixed bottom-4 right-4 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-xl z-[100] animate-fade-in flex items-center gap-3">
                    <i data-lucide="info" className="text-[var(--azul-base-3)] w-5 h-5"></i>
                    <span>{message}</span>
                    <button onClick={onClose} className="ml-4 hover:text-gray-300">
                        <i data-lucide="x" className="w-4 h-4"></i>
                    </button>
                </div>
            );
        }

        function Header({ currentPage, setCurrentPage }) {
            useLucide();
            const [isMenuOpen, setIsMenuOpen] = React.useState(false);
            const navItems = [
                { id: 'home', label: 'Início', icon: 'house' },
                { id: 'direitos', label: 'Dúvidas e Direitos', icon: 'help-circle' },
                { id: 'pilares', label: 'Pilares', icon: 'columns-3' },
                { id: 'mapa-mental', label: 'Mapa Mental', icon: 'brain-circuit' },
                { id: 'mapa', label: 'Buscar Escritórios', icon: 'map-pin' },
                { id: 'equipe', label: 'Sobre', icon: 'info' }
            ];
            const handleNavClick = (pageId) => { setCurrentPage(pageId); setIsMenuOpen(false); };
            return (
                <header className="bg-[var(--azul-padrao2)] shadow-lg sticky top-0 z-50 border-b border-[var(--azul-base)]">
                    <div className="container mx-auto px-4 flex items-center justify-between h-20">
                        <div className="flex items-center gap-3 cursor-pointer group" onClick={() => handleNavClick('home')}>
                            <img src="https://cdn-icons-png.flaticon.com/512/2966/2966334.png" alt="Logo" className="w-10 h-10 rounded-lg bg-white p-1" />
                            <h1 className="text-xl md:text-2xl font-bold text-[var(--azul-base-6)] m-0 leading-tight">Raiz da<br/>Igualdade</h1>
                        </div>
                        <nav className="hidden md:flex items-center gap-1">
                            {navItems.map(item => (
                                <button key={item.id} className={`btn-nav flex items-center gap-2 ${currentPage === item.id ? 'active' : 'opacity-80'}`} onClick={() => handleNavClick(item.id)}>
                                    <i data-lucide={item.icon} className="w-4 h-4"></i> {item.label}
                                </button>
                            ))}
                        </nav>
                        <button className="md:hidden text-white p-2" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                            <i data-lucide={isMenuOpen ? 'x' : 'menu'} className="w-6 h-6"></i>
                        </button>
                    </div>
                    {isMenuOpen && (
                        <nav className="md:hidden py-4 border-t border-[var(--azul-base)] bg-[var(--azul-padrao2)] px-4 flex flex-col gap-2">
                            {navItems.map(item => (
                                <button key={item.id} className={`w-full text-left px-4 py-3 rounded-lg flex items-center gap-3 ${currentPage === item.id ? 'bg-[var(--azul-base-2)]' : 'hover:bg-[var(--azul-base)]'}`} onClick={() => handleNavClick(item.id)}>
                                    <i data-lucide={item.icon} className="w-5 h-5"></i> {item.label}
                                </button>
                            ))}
                        </nav>
                    )}
                </header>
            );
        }

        function Home({ setCurrentPage }) {
            useLucide();
            const newsFallback = [
                { title: "Brasil sanciona lei de igualdade salarial", description: "Nova medida visa garantir que homens e mulheres recebam o mesmo salário para as mesmas funções.", source: "G1", date: "Há 2 dias", url: "https://g1.globo.com/politica/noticia/2023/07/03/lula-sanciona-lei-da-igualdade-salarial-entre-homens-e-mulheres.ghtml", urlToImage: "https://images.unsplash.com/photo-1573164713714-d95e436ab8d6?auto=format&fit=crop&q=80&w=600" },
                { title: "Avanços na legislação de direitos digitais na Europa", description: "Novas leis buscam proteger a privacidade dos cidadãos na internet.", source: "Tecnologia", date: "Há 5 horas", url: "https://www.hrw.org/pt/news/2024/05/15/europe-landmark-digital-rights-law", urlToImage: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=600" },
                { title: "Educação como pilar dos direitos fundamentais", description: "UNESCO lança campanha para erradicar analfabetismo até 2030.", source: "Educação", date: "Há 1 dia", url: "https://pt.unesco.org/themes/direito-educacao", urlToImage: "https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&q=80&w=600" },
                { title: "Combate ao Feminicídio: Um Dever de Todos", description: "Iniciativas em todo o Brasil reforçam a rede de proteção à mulher e a importância da denúncia.", source: "Justiça", date: "Há 12 horas", url: "https://www.gov.br/mulheres/pt-br", urlToImage: "https://images.unsplash.com/photo-1509099836639-18ba1795216d?auto=format&fit=crop&q=80&w=600" },
                { title: "Direitos Humanos e Inteligência Artificial", description: "Debate sobre como a IA pode impactar a privacidade e a liberdade de expressão.", source: "Conectas", date: "Há 3 dias", url: "https://www.conectas.org/noticias/ia-e-direitos-humanos/", urlToImage: "https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&q=80&w=600" },
                { title: "Refugiados no Brasil: Desafios e Conquistas", description: "Histórias de superação e a importância da acolhida humanitária.", source: "ACNUR Brasil", date: "Há 4 dias", url: "https://www.acnur.org/portugues/brasil/", urlToImage: "https://images.unsplash.com/photo-1469571486292-0ba58a3f068b?auto=format&fit=crop&q=80&w=600" }
            ];
            return (
                <div className="space-y-12 text-left fade-in">
                    <section className="relative rounded-2xl overflow-hidden shadow-2xl h-[400px] flex items-center bg-gray-800">
                        <div className="absolute inset-0 bg-gradient-to-r from-[var(--azul-padrao2)] via-[var(--azul-padrao1)] to-transparent z-10"></div>
                        <img src="https://images.unsplash.com/photo-1555848962-6e79363ec58f?auto=format&fit=crop&q=80&w=2000" className="absolute inset-0 w-full h-full object-cover" />
                        <div className="relative z-20 p-8 md:p-16 max-w-2xl">
                            <h1 className="text-4xl md:text-6xl font-extrabold text-white mb-6">Igualdade, Justiça e Liberdade</h1>
                            <p className="text-lg text-[var(--azul-base-6)] mb-8">Informação, educação e acesso à justiça em um só lugar.</p>
                            <div className="flex gap-4">
                                <button onClick={() => setCurrentPage('pilares')} className="bg-[var(--azul-base-3)] text-white px-6 py-3 rounded-lg font-bold flex items-center gap-2">
                                    <i data-lucide="book-open" className="w-5 h-5"></i> Aprenda Mais
                                </button>
                                <button onClick={() => setCurrentPage('mapa')} className="border-2 border-white text-white px-6 py-3 rounded-lg font-bold flex items-center gap-2">
                                    <i data-lucide="map-pin" className="w-5 h-5"></i> Encontrar Ajuda
                                </button>
                            </div>
                        </div>
                    </section>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                        {newsFallback.map((n, i) => (
                            <div key={i} className="bg-[var(--azul-base)] rounded-xl overflow-hidden border border-[var(--azul-base-1)] shadow-lg flex flex-col">
                                <img src={n.urlToImage} className="h-40 w-full object-cover" />
                                <div className="p-6 flex-grow flex flex-col">
                                    <h3 className="text-xl font-bold text-white mb-3">{n.title}</h3>
                                    <p className="text-[var(--azul-base-5)] text-sm mb-4 line-clamp-3">{n.description}</p>
                                    <div className="flex justify-between items-center mt-auto">
                                        <span className="text-xs text-[var(--azul-base-4)]">{n.source} • {n.date}</span>
                                        <a href={n.url} target="_blank" className="text-[var(--azul-base-3)] font-bold text-sm flex items-center gap-1">
                                            Ler mais <i data-lucide="external-link" className="w-3 h-3"></i>
                                        </a>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function RightsPanel() {
            useLucide();
            const rights = [
                { title: "Vida e Segurança", icon: "shield", content: "O direito primordial que garante a integridade física e moral de cada indivíduo (Art. 5º, Caput)." },
                { title: "Igualdade perante a Lei", icon: "users", content: "Todos são iguais sem distinção de qualquer natureza, garantindo a proibição de privilégios ou discriminações (Art. 5º, I)." },
                { title: "Prioridade e Dignidade", icon: "heart", content: "Atendimento prioritário e garantia de condições dignas para idosos e pessoas com deficiência." },
                { title: "Proteção à Maternidade", icon: "baby", content: "O Estado deve assegurar proteção especial à mãe solo e à mulher arrimo de família." }
            ];

            const laws = [
                { name: "Constituição Federal (1988)", desc: "A 'Constituição Cidadã' que estabelece os direitos e garantias fundamentais no Brasil.", link: "http://www.planalto.gov.br/ccivil_03/constituicao/constituicao.htm" },
                { name: "Estatuto do Idoso (Lei 10.741/03)", desc: "Assegura direitos sociais, proteção e prioridade para pessoas com 60 anos ou mais.", link: "http://www.planalto.gov.br/ccivil_03/leis/l10741.htm" },
                { name: "Lei Brasileira de Inclusão (Lei 13.146/15)", desc: "Assegura e promove, em condições de igualdade, o exercício dos direitos e liberdades fundamentais por pessoas com deficiência.", link: "http://www.planalto.gov.br/ccivil_03/_ato2015-2018/2017/lei/l13146.htm" },
                { name: "Lei Maria da Penha (Lei 11.340/06)", desc: "Mecanismo para coibir a violência doméstica e prevenir o feminicídio.", link: "http://www.planalto.gov.br/ccivil_03/_ato2004-2006/2006/lei/l11340.htm" }
            ];

            return (
                <div className="space-y-12 text-left fade-in">
                    <section className="bg-[var(--azul-base)] p-8 rounded-2xl shadow-xl">
                        <h2 className="text-3xl text-white mb-6 flex items-center gap-3">
                            <i data-lucide="help-circle"></i> Panorama Humanitário no Brasil
                        </h2>
                        <p className="text-[var(--azul-base-5)] mb-8">
                            Buscamos fechar o círculo da proteção social, detalhando os direitos de grupos em situação de vulnerabilidade e a importância da igualdade plena.
                        </p>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
                            {rights.map((r, i) => (
                                <div key={i} className="bg-[var(--azul-padrao1)] p-6 rounded-xl border border-[var(--azul-base-2)]">
                                    <div className="flex items-center gap-3 mb-4">
                                        <i data-lucide={r.icon} className="text-[var(--azul-base-3)] w-6 h-6"></i>
                                        <h3 className="text-xl font-bold text-white">{r.title}</h3>
                                    </div>
                                    <p className="text-sm text-[var(--azul-base-5)]">{r.content}</p>
                                </div>
                            ))}
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-12">
                            <div className="space-y-6">
                                <h3 className="text-2xl text-white font-bold border-b border-[var(--azul-base-2)] pb-2 flex items-center gap-2">
                                    <i data-lucide="user-plus" className="w-6 h-6"></i> Idosos e PCD
                                </h3>
                                <div className="space-y-4 text-[var(--azul-base-5)]">
                                    <p><strong>Idosos:</strong> O Estatuto do Idoso garante prioridade no recebimento da restituição do IR, atendimento preferencial e gratuidade em transportes públicos.</p>
                                    <p><strong>PCD:</strong> A Lei Brasileira de Inclusão (LBI) proíbe qualquer tipo de discriminação e garante acessibilidade arquitetônica, digital e comunicacional como direito fundamental.</p>
                                </div>
                            </div>
                            <div className="space-y-6">
                                <h3 className="text-2xl text-white font-bold border-b border-[var(--azul-base-2)] pb-2 flex items-center gap-2">
                                    <i data-lucide="venetian-mask" className="w-6 h-6"></i> Mulheres e Mães Solo
                                </h3>
                                <div className="space-y-4 text-[var(--azul-base-5)]">
                                    <p><strong>Mãe Solo/Arrimo:</strong> Garantia de preferência em programas habitacionais, acesso facilitado a creches e proteções específicas contra a precarização do trabalho.</p>
                                    <p><strong>Basta de Feminicídio:</strong> A lei 13.104/15 torna o feminicídio circunstância qualificadora do crime de homicídio. A proteção vai além do punitivo, focando no amparo humanitário à família.</p>
                                </div>
                            </div>
                        </div>

                        <div className="mt-12 p-6 bg-[var(--azul-padrao2)] rounded-xl border-l-4 border-red-500">
                             <h3 className="text-xl font-bold text-white mb-2">Direitos dos Estrangeiros</h3>
                             <p className="text-sm text-[var(--azul-base-5)]">
                                 A <strong>Lei de Migração (13.445/17)</strong> assegura ao migrante a condição de igualdade com os nacionais, incluindo o acesso à saúde, educação e justiça gratuita.
                             </p>
                        </div>
                    </section>

                    <section className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <h3 className="text-2xl text-white font-bold mb-6">Marcos Legais de Proteção</h3>
                            <div className="space-y-4">
                                {laws.map((l, i) => (
                                    <div key={i} className="bg-[var(--azul-base)] p-4 rounded-lg border-l-4 border-[var(--azul-base-3)]">
                                        <h4 className="font-bold text-white mb-1">{l.name}</h4>
                                        <p className="text-xs text-[var(--azul-base-5)] mb-2">{l.desc}</p>
                                        <a href={l.link} target="_blank" className="text-[var(--azul-base-3)] text-xs font-bold hover:underline">Acessar Lei na Íntegra</a>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div>
                            <h3 className="text-2xl text-white font-bold mb-6">Canais de Ajuda e Informação</h3>
                            <div className="bg-[var(--azul-base)] p-6 rounded-xl space-y-4">
                                <a href="https://www.gov.br/mdh/pt-br" target="_blank" className="flex items-center justify-between p-3 bg-[var(--azul-padrao1)] rounded hover:bg-[var(--azul-base-2)] transition-colors">
                                    <span className="text-sm font-bold">Ligue 100 - Direitos Humanos</span>
                                    <i data-lucide="phone" className="w-4 h-4"></i>
                                </a>
                                <a href="https://www.gov.br/mulheres/pt-br" target="_blank" className="flex items-center justify-between p-3 bg-[var(--azul-padrao1)] rounded hover:bg-[var(--azul-base-2)] transition-colors">
                                    <span className="text-sm font-bold">Ligue 180 - Central da Mulher</span>
                                    <i data-lucide="phone" className="w-4 h-4"></i>
                                </a>
                                <a href="https://anistia.org.br/" target="_blank" className="flex items-center justify-between p-3 bg-[var(--azul-padrao1)] rounded hover:bg-[var(--azul-base-2)] transition-colors">
                                    <span className="text-sm">Anistia Internacional Brasil</span>
                                    <i data-lucide="external-link" className="w-4 h-4"></i>
                                </a>
                                <a href="https://www.conectas.org/" target="_blank" className="flex items-center justify-between p-3 bg-[var(--azul-padrao1)] rounded hover:bg-[var(--azul-base-2)] transition-colors">
                                    <span className="text-sm">Conectas Direitos Humanos</span>
                                    <i data-lucide="external-link" className="w-4 h-4"></i>
                                </a>
                                <a href="https://www.defensoria.sp.def.br" target="_blank" className="flex items-center justify-between p-3 bg-[var(--azul-padrao1)] rounded hover:bg-[var(--azul-base-2)] transition-colors">
                                    <span className="text-sm">Defensoria Pública - Assistência</span>
                                    <i data-lucide="gavel" className="w-4 h-4"></i>
                                </a>
                            </div>
                        </div>
                    </section>
                </div>
            );
        }

        function Pillars() {
            useLucide();
            const [expandedIndex, setExpandedIndex] = React.useState(null);
            const toggleExpand = (idx) => { setExpandedIndex(expandedIndex === idx ? null : idx); };

            const sections = [
                { title: "Liberdade", icon: "sun", color: "text-yellow-400", content: "O direito de agir segundo a própria vontade, respeitando os limites da convivência.", moreContent: "A liberdade de expressão e crença são pilares protegidos pela Declaração Universal." },
                { title: "Igualdade", icon: "scale", color: "text-blue-400", content: "Garantia de mesmos direitos e oportunidades, sem qualquer discriminação.", moreContent: "A igualdade perante a lei é a base para uma sociedade justa e democrática." },
                { title: "Justiça", icon: "gavel", color: "text-red-400", content: "Aplicação imparcial das leis para assegurar o equilíbrio social.", moreContent: "O acesso à justiça gratuita é fundamental para garantir os direitos de todos." },
                { title: "Dignidade", icon: "sprout", color: "text-green-400", content: "Valor intrínseco de cada ser humano como base de todos os direitos.", moreContent: "A dignidade proíbe tratamentos degradantes e é o núcleo central dos direitos humanos." }
            ];

            return (
                <div className="max-w-6xl mx-auto py-8 fade-in text-left">
                    <div className="text-center mb-12">
                        <h2 className="text-3xl md:text-4xl font-bold text-white mb-4">Os 4 Pilares Fundamentais</h2>
                        <p className="text-[var(--azul-base-4)] max-w-2xl mx-auto">Conheça os conceitos essenciais que sustentam os Direitos Humanos.</p>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        {sections.map((s, i) => (
                            <div key={i} className={`bg-[var(--azul-base)] rounded-2xl p-6 border border-transparent hover:border-[var(--azul-base-3)] transition-all flex flex-col ${expandedIndex === i ? 'md:col-span-2 bg-[var(--azul-padrao1)]' : ''}`}>
                                <div className={`w-14 h-14 rounded-full bg-[var(--azul-padrao1)] flex items-center justify-center mb-6 ${s.color}`}>
                                    <i data-lucide={s.icon} className="w-8 h-8"></i>
                                </div>
                                <h3 className="text-xl font-bold text-white mb-4">{s.title}</h3>
                                <p className="text-[var(--azul-base-5)] text-sm mb-4">{s.content}</p>
                                {expandedIndex === i && <p className="text-white text-sm animate-fade-in mt-2 pb-4">{s.moreContent}</p>}
                                <button onClick={() => toggleExpand(i)} className="mt-auto text-[var(--azul-base-3)] text-sm font-semibold flex items-center gap-1">
                                    {expandedIndex === i ? 'Menos' : 'Mais'} <i data-lucide={expandedIndex === i ? 'chevron-up' : 'chevron-down'} className="w-4 h-4"></i>
                                </button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function MindMap() {
            useLucide();
            return (
                <div className="flex flex-col items-center py-8 fade-in">
                    <h2 className="text-3xl text-white mb-8">Mapa Mental - Direitos Humanos</h2>
                    <div className="bg-[var(--azul-base)] p-4 rounded-xl shadow-2xl relative group cursor-pointer">
                        <img src="WhatsApp Image 2026-04-06 at 12.54.21 PM.jpeg" className="rounded-lg max-w-full md:max-w-2xl border-4 border-[var(--azul-base-2)]" />
                        <div className="absolute inset-0 flex items-center justify-center bg-black bg-opacity-0 group-hover:bg-opacity-30 transition-all rounded-xl">
                            <i data-lucide="zoom-in" className="text-white w-12 h-12 opacity-0 group-hover:opacity-100 transition-opacity"></i>
                        </div>
                    </div>
                </div>
            );
        }

        function MapSearch() {
            useLucide();
            const mapContainerRef = React.useRef(null);
            const mapInstanceRef = React.useRef(null);
            const offices = [
                { name: "Defensoria Pública SP - Unidade Central", desc: "Atendimento jurídico gratuito geral e especializado.", url: "https://www.defensoria.sp.def.br", coords: [-23.550520, -46.633308] },
                { name: "DJ XI de Agosto", desc: "Assistência judiciária gratuita mantida pelos alunos da USP.", url: "https://juridicoxideagosto.wordpress.com", coords: [-23.5517, -46.6345] },
                { name: "CEDECA - Defesa da Criança e do Adolescente", desc: "Especializado em direitos infantojuvenis.", url: "https://cedeca.org.br", coords: [-23.5489, -46.6388] },
                { name: "Instituto Pro Bono", desc: "Conecta advogados voluntários a causas sociais e pessoas carentes.", url: "https://probono.org.br", coords: [-23.5580, -46.6610] },
                { name: "Geledés - Instituto da Mulher Negra", desc: "Apoio jurídico e psicológico para vítimas de racismo e sexismo.", url: "https://www.geledes.org.br", coords: [-23.5425, -46.6366] },
                { name: "Casa do Migrante", desc: "Apoio jurídico e humanitário para imigrantes e refugiados.", url: "https://www.Scalabrini.org", coords: [-23.5550, -46.6250] }
            ];

            React.useEffect(() => {
                if (mapContainerRef.current && !mapInstanceRef.current) {
                    const map = L.map(mapContainerRef.current).setView([-23.55052, -46.633308], 12);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    offices.forEach(o => {
                        L.marker(o.coords).addTo(map).bindPopup(`<b>${o.name}</b><br>${o.desc}<br><a href="${o.url}" target="_blank">Site</a>`);
                    });
                    mapInstanceRef.current = map;
                }
                return () => { if (mapInstanceRef.current) { mapInstanceRef.current.remove(); mapInstanceRef.current = null; } };
            }, []);

            return (
                <div className="py-8 text-left fade-in">
                    <h2 className="text-3xl text-white text-center mb-8 flex items-center justify-center gap-3">
                        <i data-lucide="map-pin"></i> Escritórios de Apoio e Defesa
                    </h2>
                    <div id="map" ref={mapContainerRef} className="w-full h-[400px] rounded-xl mb-8 z-0 border border-[var(--azul-base-1)]"></div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {offices.map((o, i) => (
                            <div key={i} className="bg-[var(--azul-base)] p-6 rounded-xl border-l-4 border-[var(--azul-base-3)] flex flex-col">
                                <h3 className="text-lg font-bold text-white mb-2">{o.name}</h3>
                                <p className="text-[var(--azul-base-5)] text-sm mb-4 flex-grow">{o.desc}</p>
                                <a href={o.url} target="_blank" className="bg-[var(--azul-padrao1)] text-white px-4 py-2 rounded text-center text-sm hover:bg-[var(--azul-base-2)] transition-colors">Visitar Site</a>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function Team() {
            useLucide();
            const members = [
                { name: "Giovanni Gonçalves Santini", ra: "242003407" },
                { name: "Gabriel Seiti de Marino Suda", ra: "241001360" },
                { name: "Murilo Vieira Marinho", ra: "170000992" },
                { name: "Victor Gonzales de Sa", ra: "241001342" }
            ];
            return (
                <div className="py-8 fade-in">
                    <h2 className="text-3xl text-white mb-8 text-center">Equipe de Desenvolvimento</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        {members.map((m, i) => (
                            <div key={i} className="bg-[var(--azul-base)] p-6 rounded-xl border border-[var(--azul-base-1)] text-center">
                                <div className="w-16 h-16 bg-[var(--azul-padrao1)] rounded-full mx-auto mb-4 flex items-center justify-center border-2 border-[var(--azul-base-2)]">
                                    <i data-lucide="user" className="w-8 h-8 text-[var(--azul-base-3)]"></i>
                                </div>
                                <h3 className="text-sm font-bold text-white">{m.name}</h3>
                                <p className="text-xs text-[var(--azul-base-3)]">RA: {m.ra}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function App() {
            useLucide();
            const [currentPage, setCurrentPage] = React.useState('home');
            const [toast, setToast] = React.useState(null);
            const renderPage = () => {
                switch (currentPage) {
                    case 'home': return <Home setCurrentPage={setCurrentPage} />;
                    case 'direitos': return <RightsPanel />;
                    case 'pilares': return <Pillars />;
                    case 'mapa-mental': return <MindMap />;
                    case 'mapa': return <MapSearch />;
                    case 'equipe': return <Team />;
                    default: return <Home setCurrentPage={setCurrentPage} />;
                }
            };
            return (
                <div className="min-h-screen flex flex-col">
                    <Header currentPage={currentPage} setCurrentPage={setCurrentPage} />
                    <main className="flex-grow container mx-auto px-4 py-8 max-w-5xl text-center">
                        {renderPage()}
                    </main>
                    {toast && <Toast message={toast} onClose={() => setToast(null)} />}
                    <footer className="py-8 bg-[var(--azul-padrao2)] border-t border-[var(--azul-base)] text-xs text-[var(--azul-base-5)]">
                        <div className="container mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4 text-center">
                            <p>© 2026 Raiz da Igualdade | Projeto Acadêmico Direitos Humanos</p>
                            <div className="flex gap-6">
                                <i data-lucide="instagram" className="w-5 h-5 cursor-pointer hover:text-white"></i>
                                <i data-lucide="twitter" className="w-5 h-5 cursor-pointer hover:text-white"></i>
                                <i data-lucide="mail" className="w-5 h-5 cursor-pointer hover:text-white"></i>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
